name: Deploy para Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Validar secrets de SSH
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
        run: |
          test -n "$SSH_HOST" || (echo "Secret ausente: SSH_HOST" && exit 1)
          test -n "$SSH_USERNAME" || (echo "Secret ausente: SSH_USERNAME" && exit 1)
          test -n "$SSH_PASSWORD" || (echo "Secret ausente: SSH_PASSWORD" && exit 1)
          test -n "$SSH_TARGET_DIR" || (echo "Secret ausente: SSH_TARGET_DIR" && exit 1)

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: curl, json, mbstring, zip
          coverage: none

      - name: Instalar dependências
        run: composer install --no-dev --optimize-autoloader --ignore-platform-req=ext-gd

      - name: Diagnóstico SSH (pré-check)
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT || 22 }}
          SSH_USERNAME: ${{ secrets.SSH_USERNAME }}
          SSH_PASSWORD: ${{ secrets.SSH_PASSWORD }}
          SSH_TARGET_DIR: ${{ secrets.SSH_TARGET_DIR }}
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass

          set +e
          OUT=$(sshpass -p "$SSH_PASSWORD" ssh \
            -p "$SSH_PORT" \
            -o StrictHostKeyChecking=no \
            -o UserKnownHostsFile=/dev/null \
            -o ConnectTimeout=10 \
            "$SSH_USERNAME@$SSH_HOST" \
            "echo SSH_OK && ls -ld \"$SSH_TARGET_DIR\"" 2>&1)
          CODE=$?
          set -e

          if [ "$CODE" -eq 0 ]; then
            echo "Diagnóstico SSH: conexão e autenticação OK."
            echo "$OUT"
            exit 0
          fi

          echo "Diagnóstico SSH falhou (exit $CODE)."
          echo "$OUT"
          if echo "$OUT" | grep -qi "Permission denied"; then
            echo "Causa provável: usuário/senha SSH inválidos (ou senha SSH desatualizada)."
          elif echo "$OUT" | grep -qi "Connection refused"; then
            echo "Causa provável: porta SSH incorreta ou SSH desabilitado no servidor."
          elif echo "$OUT" | grep -qi "timed out\|No route to host\|Name or service not known"; then
            echo "Causa provável: host/IP incorreto ou bloqueio de rede/firewall."
          elif echo "$OUT" | grep -qi "No such file or directory"; then
            echo "Causa provável: SSH_TARGET_DIR inválido."
          else
            echo "Causa não classificada. Verifique host, porta, usuário, senha e target_dir."
          fi
          exit 1

      - name: Preparar estrutura de deploy
        run: |
          mkdir -p deploy
          shopt -s dotglob
          cp -r public/* deploy/
          # Garante envio de dotfiles críticos (ex.: .htaccess)
          cp -f public/.htaccess deploy/.htaccess
          cp -r src deploy/
          cp -r vendor deploy/
          cp .env.example deploy/

      - name: Preparar server-dir
        id: serverdir
        run: |
          DIR="${{ secrets.FTP_SERVER_DIR || '/' }}"
          DIR="${DIR%/}/"
          echo "dir=$DIR" >> $GITHUB_OUTPUT

      - name: Verificar pasta remota (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            TARGET_DIR="${{ secrets.SSH_TARGET_DIR }}"
            TARGET_DIR="${TARGET_DIR%/}"
            if [ -z "$TARGET_DIR" ]; then
              echo "SSH_TARGET_DIR vazio no workflow."
              exit 1
            fi
            pwd
            ls -la
            ls -la "$TARGET_DIR"

      - name: Deploy via SFTP (SSH)
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "deploy"
          target: ${{ secrets.SSH_TARGET_DIR }}
          strip_components: 1

      - name: Validar arquivo deployado (admin dashboard)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            TARGET="${{ secrets.SSH_TARGET_DIR }}"
            TARGET="${TARGET%/}"
            DASH="$TARGET/admin/dashboard.php"

            echo "Validando dashboard em: $DASH"
            if [ ! -f "$DASH" ]; then
              echo "ERRO: dashboard.php não encontrado no TARGET."
              echo "Possível causa: SSH_TARGET_DIR aponta para pasta errada."
              ls -la "$TARGET" || true
              exit 1
            fi

            if grep -q 'data-tab="fluxo-caixa"' "$DASH"; then
              echo "OK: botão/aba Fluxo de Caixa presente no arquivo deployado."
            else
              echo "ERRO: arquivo deployado não contém fluxo-caixa."
              echo "Possível causa: deploy em pasta errada ou conteúdo antigo."
              exit 1
            fi

      - name: Mover .env para fora da raiz web (SSH)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script_stop: true
          script: |
            TARGET="${{ secrets.SSH_TARGET_DIR }}"
            TARGET="${TARGET%/}"
            if [ -z "$TARGET" ]; then
              echo "SSH_TARGET_DIR vazio no workflow."
              exit 1
            fi
            PARENT="$(dirname "$TARGET")"
            if [ -f "$TARGET/.env" ]; then
              cp -f "$TARGET/.env" "$PARENT/.env"
            fi
            if [ -f "$PARENT/.env" ]; then
              chmod 600 "$PARENT/.env" || true
              rm -f "$TARGET/.env"
            fi
